name: Build macOS portable release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload the macOS zip to, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build macOS portable zip
        run: bash portable/build_macos.sh

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: gh release upload "$RELEASE_TAG" dist/DistortionsDemo_macOS.zip --clobber
